name = "relationship-advisor-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"
workers_dev = true
migrations_dir = "migrations"

[observability]
enabled = true

[vars]
GEMINI_MODEL = "gemini-2.0-flash"
# For local/dev only if needed:
# GEMINI_API_KEY = ""
# ADMIN_TOKEN = ""

[[d1_databases]]
binding = "DB"
database_name = "consultant1"
database_id = "ea1fe787-aa2a-46a1-a60b-a24568da37cf"

# [[r2_buckets]]
# binding = "RAW_LOGS"
# bucket_name = "REPLACE_WITH_R2_BUCKET_NAME"

# Set sensitive values with Wrangler secrets:
# wrangler secret put GEMINI_API_KEY
# wrangler secret put ADMIN_TOKEN
# Cloudflare Pages (GitHub連携) の場合は、Cloudflare Dashboardでこのリポジトリを接続し、
# Build output directory を frontend/public に設定してください。
# Optional future secret/var candidates:
# - R2_BUCKET
